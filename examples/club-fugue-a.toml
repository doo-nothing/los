# club-fugue-a.toml — Dancing in the Club (This Is Lorelei / MJ Lenderman
# version) as a glacial fugue. Sounding key F major; the song's loop
# Bb-F-Dm-C, one chord per bar; the subject is its descending top
# voice (D-C-A-G with the resolving tail). 84 bars, ~11 minutes:
# a tonic-pedal hum opens the club, five entries stack one at a time
# (no jarring entrances — every amp envelope rises slow), the bloom
# holds, then voices leave one at a time until only the hum is left —
# the last person in the wretched stinky night club.
#
#   bars  0-5   a  the hum            F1 pedal alone           30
#   bars  6-13  b  subject enters     soprano, soft            30
#   bars 14-21  c  answer enters      a fourth below           31
#   bars 22-29  d  augmentation      tenor, half speed       32
#   bars 30-37  e  the dance          counter-subject + bass walks 33
#   bars 38-49  f  THE BLOOM          all voices hot, descant   34
#   bars 50-57  g  receding           descant out, counter soft 32
#   bars 58-65  h  thinning           tenor + counter out, subject fragments 30
#   bars 66-71  i  almost gone        answer out                28
#   bars 72-79  j  the floor          subject out, bass to hum  26
#   bars 80-83  k  the hum            last person leaves        24
#
# Generated by a script; the file is the score. los check, then
# los render examples/club-fugue-a.toml take.wav

