# club-fugue-g.toml — Dancing in the Club, third movement: the synthesis.
# Level jumps are gone by construction: voices enter as COMPOSED fades
# (128-step patterns ramping velocity over ~2 minutes), fx mod slots
# move in ≤0.06 deltas, tempo steps ≤4 BPM. The fugue subject runs
# THROUGH delay 0 (insert, dry 0.55) into a descending ping-pong tap
# ladder — classic repeats, fading and layering. The bass is the
# non-enveloped Cortini drone, lifted out of the mud (Bb1/F2). Plucky
# vactrol strings (env pluck 0.85) arpeggiate the chord tones. The
# ~5:00-of-take-e sound — the full ensemble over the cloud — holds for
# a 28-bar peak.
#
#   bars   0-7    a  drone + hum            58
#   bars   8-19   b  subject fades in (2min) 58
#   bars  20-31   c  strings fade in         60
#   bars  32-43   d  answer fades in         62
#   bars  44-55   e  subject hot, shimmer    64
#   bars  56-83   f  THE PEAK (28 bars)      66
#   bars  84-95   g  receding                60
#   bars  96-107  h  thinning                52
#   bars 108-117  i  drone again             46
#   bars 118-127  j  the hum, last person    42
#
# No swarm; echo hotter (regen .65), subject +12 at the peak.

[meta]
name = "club-fugue-g"
created = ""
format = 2

[[windows]]
name = "modules"

[[windows.panes]]
module = "sequencer"
instance = 0

