# grids-demo.toml — grids driving a peaks 808 kit, with the lfo
# walking the map's x axis. Uncommitted example (house rule).

[meta]
name = "grids-demo"
created = ""
format = 2

[[windows]]
name = "modules"

[[windows.panes]]
module = "sequencer"
instance = 0

[windows.panes.patch_inline]
bpm = 122.0
playing = false

[[windows.panes]]
module = "grids"
instance = 0

[windows.panes.patch_inline]
format = 2
mode = "drums"
x = 0.35
y = 0.6
chaos = 0.15
fill1 = 0.6
fill2 = 0.45
fill3 = 0.7
x_src = "lfo/0/s1"

[[windows.panes]]
module = "peaks"
instance = 0

[windows.panes.patch_inline]
format = 2
fn1 = "bass_drum"
fn2 = "snare_drum"
p1 = [0.5, 0.85, 0.5, 0.55]
p2 = [0.5, 0.5, 0.65, 0.5]
level = 0.85
notes1_src = "grids/0/bd"
notes2_src = "grids/0/sd"

[[windows.panes]]
module = "peaks"
instance = 1

[windows.panes.patch_inline]
format = 2
fn1 = "high_hat"
fn2 = "envelope"
p1 = [0.5, 0.5, 0.5, 0.3]
p2 = [0.1, 0.5, 0.5, 0.4]
level = 0.5
notes1_src = "grids/0/hh"

[[windows.panes]]
module = "lfo"
instance = 0

[windows.panes.patch_inline]
format = 2
mode = "free"

[[windows.panes.patch_inline.channels]]
freq = 0.12
shape = "sine"
phase = 0.0

[[windows.panes]]
module = "mixer"
instance = 0

[[windows.panes]]
module = "scope"
instance = 0
