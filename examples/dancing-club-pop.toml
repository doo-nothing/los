# dancing-club-pop.toml — the wild card: a proper synth-pop rendition
# of Dancing in the Club. Drums built from vactrol-plucked voices
# (kick = sine thump, snare = folded crack, hat = folded tick), an
# eighth-note pop bassline, the hook as lead, swarm 5th-stabs as the
# comp, and a real form at 102 BPM, ~4:05:
#
#   bars   0-7    a  intro: kick + hats + bass + pad
#   bars   8-23   v  verse 1 (half-time kick, hook low)
#   bars  24-39   c  CHORUS (four-on-floor, hook high, fx wet)
#   bars  40-55   v  verse 2
#   bars  56-71   c  chorus 2
#   bars  72-79   b  bridge (drums out, pads breathe)
#   bars  80-95   c  chorus 3 (double)
#   bars  96-103  o  outro, thinning
#
# swarm/0's amp rides envelope/1/ch2 (a slow looping LFO) for comp
# movement; envelope/1/ch1 still breathes the filterbank.

[meta]
name = "dancing-club-pop"
created = ""
format = 2

[[windows]]
name = "modules"

[[windows.panes]]
module = "sequencer"
instance = 0

[windows.panes.patch_inline]
bpm = 102.0
playing = false
lane = ["a", "", "", "", "", "", "", "", "v", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "c", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "v", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "c", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "b", "", "", "", "", "", "", "", "c", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "o", "", "", "", "", "", "", ""]
lane_len = 104

