# the chain: sampler → wasp → dld. Each claims the one before; only
# the DLD's strip reaches the console.
[[windows.panes]]
module = "wasp"
instance = 0

[windows.panes.patch_inline]
format = 2
input = "sampler/0"
freq = 0.6
res = 0.35
mix = 0.0
dirt = 0.65
bp = 0.0
dry = 0.25
freq_src = "sequencer/0/t4"

[[windows.panes]]
module = "dld"
instance = 0

[windows.panes.patch_inline]
format = 2
input = "wasp/0"
ping_ms = 0.0
mono = false

[windows.panes.patch_inline.a]
time = 3.0
switch = "/8"
fdbk = 0.55
feed = 1.0
mix = 0.45
hold_src = "sequencer/0/t2"
rev_src = "sequencer/0/t3"

[windows.panes.patch_inline.b]
time = 4.0
switch = "="
fdbk = 0.65
feed = 0.8
mix = 0.35

# a drone gated by the DLD's loop clock through an envelope — the
# hardware's favorite patch, two cables
[[windows.panes]]
module = "voice"
instance = 0

[windows.panes.patch_inline]
format = 2
shape = 0.12
sub = 0.85
lpg = 0.4
level = 0.45
amp_src = "envelope/0/ch1"
notes_src = "sequencer/0/t2"

[[windows.panes]]
module = "envelope"
instance = 0

[windows.panes.patch_inline]
format = 2
[[windows.panes.patch_inline.channels]]
rise = 0.3
fall = 0.75
shape = 0.5
loop_mode = false
gate_mode = false
pluck = 0.0
offset = 0.0
attenuverter = 1.0
trigger_src = "dld/0/lpa"

[[windows.panes]]
module = "mixer"
instance = 0

[[windows.panes]]
module = "scope"
instance = 0
