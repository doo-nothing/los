# gamelan-elements.toml — four Elements voices as a gamelan, ~5:10.
# All slendro; original interlocking patterns in the kotekan manner
# (polos on-beats, sangsih in the gaps), a 32-step colotomic gong
# cycle, an irama-style density lift mid-form, and the gong left
# alone at the end. The wasp gives the ensemble a shared resonant
# body on send A; the DLD is clock-locked air on send B.

[meta]
name = "gamelan-elements"
created = ""
format = 2

[[windows]]
name = "modules"

[[windows.panes]]
module = "sequencer"
instance = 0

[windows.panes.patch_inline]
