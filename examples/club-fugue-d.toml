# club-fugue-d.toml — Dancing in the Club, second movement: ALIVE.
# Round-one feedback: more crescendo, faster, higher, fx that build.
# Tempo arc 44→62→32 over 120 bars (~10 min); the subject lifts an
# octave on its hot slot; velocities tier 38→127; the peak adds
# double-time counter-eighths, octave bass kicks, ratchets; and the
# delay's wash + shim RIDE sequencer/0/t8, whose pattern slots ramp
# floor→mid→peak with the form — the club air itself crescendos.
#
#   bars   0-7    a  the hum               44
#   bars   8-21   b  subject, mid          44
#   bars  22-35   c  answer + fx to mid    48
#   bars  36-49   d  the dance begins      50
#   bars  50-63   e  THE LIFT: subject+answer up an octave   54
#   bars  64-83   f  THE PEAK: descant, double-time, fx wide 62
#   bars  84-93   g  receding              50
#   bars  94-105  h  thinning, back down   40
#   bars 106-119  i  the hum, last person  32
#
# Six raspy voices, no swarm.

