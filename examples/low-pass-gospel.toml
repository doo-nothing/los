# low-pass-gospel.toml — a song for the streams vactrol.
# The kick track plucks a swarm pad through the streams LPG (left),
# while the compressor side (right) holds the bed steady; the
# vactrol's frequency CV drives a wasp on the way to the mixer, so
# every kick opens both the gate and the filter. Form: home -> pulse
# -> groove -> strip -> peak -> afterglow -> floor, 64 bars.

