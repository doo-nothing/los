# peaks-demo.toml — a two-instance 808 kit: kick+snare on one peaks,
# hat+tap-LFO on the other (the tap LFO riding the wasp cutoff).
# Uncommitted example (house rule).

[meta]
name = "peaks-demo"
created = ""
format = 2

[[windows]]
name = "modules"

[[windows.panes]]
module = "sequencer"
instance = 0

[windows.panes.patch_inline]
bpm = 124.0
playing = false

[[windows.panes.patch_inline.tracks]]
length = 16
steps = [
  { active = true, note = 36, velocity = 110 },
  { active = false, note = 36, velocity = 80 },
  { active = false, note = 36, velocity = 80 },
  { active = false, note = 36, velocity = 80 },
  { active = true, note = 36, velocity = 96 },
  { active = false, note = 36, velocity = 80 },
  { active = false, note = 36, velocity = 80 },
  { active = true, note = 36, velocity = 70, prob = 40 },
  { active = true, note = 36, velocity = 108 },
  { active = false, note = 36, velocity = 80 },
  { active = false, note = 36, velocity = 80 },
  { active = false, note = 36, velocity = 80 },
  { active = true, note = 36, velocity = 100 },
  { active = false, note = 36, velocity = 80 },
  { active = true, note = 36, velocity = 64, prob = 30 },
  { active = false, note = 36, velocity = 80 },
]

[[windows.panes.patch_inline.tracks]]
length = 16
steps = [
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = true, note = 38, velocity = 100 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = true, note = 38, velocity = 60, prob = 50 },
  { active = false, note = 38, velocity = 80 },
  { active = true, note = 38, velocity = 104 },
  { active = false, note = 38, velocity = 80 },
  { active = false, note = 38, velocity = 80 },
  { active = true, note = 38, velocity = 72, prob = 35 },
]

[[windows.panes.patch_inline.tracks]]
length = 8
steps = [
  { active = true, note = 42, velocity = 70 },
  { active = true, note = 42, velocity = 40 },
  { active = true, note = 42, velocity = 84 },
  { active = true, note = 42, velocity = 44 },
  { active = true, note = 42, velocity = 74 },
  { active = true, note = 42, velocity = 38 },
  { active = true, note = 42, velocity = 90 },
  { active = true, note = 42, velocity = 48 },
]

[[windows.panes]]
module = "peaks"
instance = 0

[windows.panes.patch_inline]
format = 2
fn1 = "bass_drum"
fn2 = "snare_drum"
p1 = [0.5, 0.9, 0.55, 0.6]
p2 = [0.5, 0.45, 0.7, 0.5]
level = 0.85
notes1_src = "sequencer/0/t1"
notes2_src = "sequencer/0/t2"

[[windows.panes]]
module = "peaks"
instance = 1

[windows.panes.patch_inline]
format = 2
fn1 = "high_hat"
fn2 = "tap_lfo"
p1 = [0.5, 0.5, 0.5, 0.35]
p2 = [0.2, 0.6, 0.0, 1.0]
level = 0.5
notes1_src = "sequencer/0/t3"
notes2_src = "sequencer/0/t1"

[[windows.panes]]
module = "wasp"
instance = 0

[windows.panes.patch_inline]
format = 2
input = "send/0"
freq = 0.4
res = 0.55
mix = 0.0
dirt = 0.4
bp = 0.3
dry = 0.0
freq_src = "peaks/1/ch2"

[[windows.panes]]
module = "mixer"
instance = 0

[[windows.panes]]
module = "scope"
instance = 0
